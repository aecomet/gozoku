<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>夏詣で - 夏の豪族会への道</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Kosugi+Maru&display=swap" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b1a2b;
        font-family: 'Kosugi Maru', sans-serif;
        touch-action: none;
        overscroll-behavior: none;
      }
      #game-container {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #intro {
        position: fixed;
        top: 6%;
        left: 50%;
        transform: translateX(-50%);
        color: #fff4d6;
        text-align: center;
        z-index: 20;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
        font-size: 4.2vw;
        max-width: 90vw;
        transition: opacity 1.2s ease;
        pointer-events: none;
        letter-spacing: 0.05em;
      }
      #intro small {
        display: block;
        font-size: 2.6vw;
        opacity: 0.85;
        margin-top: 6px;
      }
      #intro.hide {
        opacity: 0;
      }
      #dpad {
        position: fixed;
        right: 5vw;
        bottom: 6vh;
        width: 36vw;
        height: 36vw;
        max-width: 170px;
        max-height: 170px;
        z-index: 30;
        user-select: none;
        background: rgba(255, 255, 255, 0.12);
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.15);
      }
      .dbtn {
        position: absolute;
        width: 32%;
        height: 32%;
        background: rgba(255, 255, 255, 0.88);
        border: 2px solid rgba(255, 255, 255, 0.5);
        border-radius: 12%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(60, 40, 20, 0.5);
        font-size: 6vw;
        font-weight: bold;
        font-variant-emoji: text;
        box-shadow:
          0 4px 14px rgba(0, 0, 0, 0.25),
          0 0 16px rgba(255, 255, 255, 0.2),
          inset 0 0 8px rgba(255, 255, 255, 0.35);
        touch-action: none;
        transition:
          background 0.1s,
          box-shadow 0.1s,
          color 0.1s,
          transform 0.1s;
      }
      .dbtn.active {
        background: rgba(255, 200, 60, 0.95);
        color: #5a3010;
        border-color: rgba(255, 180, 40, 0.8);
        box-shadow:
          0 2px 8px rgba(0, 0, 0, 0.3),
          0 0 28px rgba(255, 200, 60, 0.5);
        transform: scale(0.92);
      }
      #btn-up {
        top: 8%;
        left: 35%;
      }
      #btn-down {
        top: 62%;
        left: 35%;
      }
      #btn-left {
        top: 35%;
        left: 8%;
      }
      #btn-right {
        top: 35%;
        left: 62%;
      }
      #ending {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at 50% 45%, rgba(20, 8, 8, 0) 0%, rgba(10, 5, 10, 0.85) 70%);
        opacity: 0;
        pointer-events: none;
        visibility: hidden;
        transition:
          opacity 1s ease,
          visibility 0s 1s;
      }
      #ending.show {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        transition:
          opacity 1s ease,
          visibility 0s 0s;
        user-select: none;
        -webkit-user-select: none;
      }
      #scroll {
        position: relative;
        width: min(86vw, 620px);
        padding: 6vh 4vw 5vh;
        background: linear-gradient(180deg, rgba(140, 31, 40, 0.97), rgba(90, 16, 22, 0.97));
        border: 3px solid #d4af37;
        border-radius: 6px;
        box-shadow:
          0 0 0 6px rgba(0, 0, 0, 0.25),
          0 20px 60px rgba(0, 0, 0, 0.7),
          0 0 40px rgba(212, 175, 55, 0.35);
        text-align: center;
        transform: translateY(-140%) scale(0.9);
        opacity: 0;
      }
      #ending.show #scroll {
        animation: dropIn 1.1s cubic-bezier(0.2, 0.9, 0.25, 1.1) 0.15s forwards;
      }
      @keyframes dropIn {
        0% {
          transform: translateY(-140%) scale(0.9);
          opacity: 0;
        }
        60% {
          transform: translateY(6%) scale(1.03);
          opacity: 1;
        }
        100% {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
      }
      #scroll::before,
      #scroll::after {
        content: '';
        position: absolute;
        left: -14px;
        right: -14px;
        height: 22px;
        background: linear-gradient(90deg, #7a1015, #c9a227, #7a1015);
        border-radius: 10px;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.5);
      }
      #scroll::before {
        top: -14px;
      }
      #scroll::after {
        bottom: -14px;
      }
      #main-kanji {
        font-family: 'Yuji Syuku', serif;
        font-size: min(13vw, 76px);
        color: #ffe9a8;
        line-height: 1.35;
        text-shadow:
          0 0 18px rgba(255, 210, 110, 0.6),
          0 3px 3px rgba(0, 0, 0, 0.6);
        letter-spacing: 0.04em;
        opacity: 0;
      }
      #ending.show #main-kanji {
        animation: fadeUp 1s ease 1.1s forwards;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      #sub-text {
        font-family: 'Kosugi Maru', sans-serif;
        color: #f4d9b0;
        font-size: min(4vw, 20px);
        margin-top: 18px;
        letter-spacing: 0.15em;
        opacity: 0;
      }
      #ending.show #sub-text {
        animation: fadeUp 1s ease 1.6s forwards;
      }
      #seal {
        position: absolute;
        right: 14px;
        bottom: 14px;
        width: 15vw;
        height: 15vw;
        max-width: 64px;
        max-height: 64px;
        border-radius: 50%;
        background: #a3121f;
        border: 2px solid #ffdca0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ffe9c2;
        font-family: 'Yuji Syuku', serif;
        font-size: min(4vw, 20px);
        opacity: 0;
        transform: rotate(-12deg) scale(0.6);
      }
      #ending.show #seal {
        animation: sealIn 0.6s ease 2.1s forwards;
      }
      @keyframes sealIn {
        to {
          opacity: 0.95;
          transform: rotate(-12deg) scale(1);
        }
      }
      #loading {
        position: fixed;
        inset: 0;
        background: #0b1a2b;
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ffe9a8;
        font-size: 4vw;
        letter-spacing: 0.1em;
      }
    </style>
  </head>
  <body>
    <div id="loading">祭りの夜へ…</div>
    <div id="game-container"></div>
    <div id="intro">豪族を動かして鳥居を目指そう<small>約10歩で鳥居に到達</small></div>
    <div id="dpad">
      <div class="dbtn" id="btn-up">▲</div>
      <div class="dbtn" id="btn-left">◀</div>
      <div class="dbtn" id="btn-right">▶</div>
      <div class="dbtn" id="btn-down">▼</div>
    </div>
    <div id="ending">
      <div id="scroll">
        <div id="main-kanji">夏の豪族会<br />開催決定</div>
        <div id="sub-text">―夏の宵、豪族は猛る―</div>
        <div id="seal">祭</div>
      </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
      (function () {
        'use strict';

        /* ================================================================
   PIXEL ART — 豪族キャラクター (48x64)
   ================================================================ */
        function px(ctx, x, y, w, h, c) {
          ctx.fillStyle = c;
          ctx.fillRect(x, y, w, h);
        }
        function ln(ctx, x1, y1, x2, y2, c) {
          if (x1 === x2 && y1 === y2) return;
          ctx.fillStyle = c;
          var dx = Math.abs(x2 - x1),
            dy = Math.abs(y2 - y1);
          var sx = x1 < x2 ? 1 : -1,
            sy = y1 < y2 ? 1 : -1;
          var err = dx - dy;
          for (var i = 0; i < 300; i++) {
            ctx.fillRect(x1, y1, 1, 1);
            if (x1 === x2 && y1 === y2) break;
            var e2 = 2 * err;
            if (e2 > -dy) {
              err -= dy;
              x1 += sx;
            }
            if (e2 < dx) {
              err += dx;
              y1 += sy;
            }
          }
        }

        /* --- 衣装カラーパレット --- */
        var C = {
          skin: '#f0c898',
          skinS: '#e0b888',
          hair: '#1a1210',
          robe1: '#4a2068',
          robe2: '#381850',
          robeL: '#5c3080',
          robeH: '#502870',
          obi: '#c8a030',
          obiH: '#e8c840',
          acc: '#d4a830',
          accH: '#f0c840',
          leg: '#2a2a40',
          foot: '#b8946c',
          footD: '#8a7050',
          eboshi: '#1a1218',
          eboshiH: '#2a2228'
        };

        /* --- 正面：立ち（折烏帽子＋直衣） --- */
        function drawFrontStand(ctx) {
          ctx.clearRect(0, 0, 48, 64);
          /* 折烏帽子 */
          px(ctx, 17, 0, 14, 6, C.eboshi);
          px(ctx, 16, 1, 2, 5, C.eboshi);
          px(ctx, 30, 1, 2, 5, C.eboshi);
          px(ctx, 18, 0, 10, 1, C.eboshiH);
          px(ctx, 28, 0, 6, 3, C.eboshi);
          px(ctx, 32, 1, 4, 2, C.eboshi);
          px(ctx, 34, 2, 3, 2, C.eboshiH);
          px(ctx, 20, 5, 8, 1, '#8a7060');
          /* 顔（14px幅） */
          px(ctx, 17, 6, 14, 13, C.skin);
          px(ctx, 17, 6, 14, 1, C.skinS);
          px(ctx, 19, 9, 3, 1, '#2a1a10');
          px(ctx, 26, 9, 3, 1, '#2a1a10');
          px(ctx, 20, 11, 2, 1, '#1a1210');
          px(ctx, 26, 11, 2, 1, '#1a1210');
          px(ctx, 20, 11, 1, 1, '#ffffff');
          px(ctx, 26, 11, 1, 1, '#ffffff');
          px(ctx, 19, 14, 2, 1, '#e8a898');
          px(ctx, 27, 14, 2, 1, '#e8a898');
          px(ctx, 22, 16, 4, 1, '#c08060');
          px(ctx, 18, 6, 12, 1, C.hair);
          /* 直衣 */
          px(ctx, 16, 19, 16, 12, C.robe1);
          px(ctx, 15, 19, 1, 12, C.robe2);
          px(ctx, 32, 19, 1, 12, C.robe2);
          px(ctx, 17, 19, 1, 12, C.robeL);
          px(ctx, 31, 19, 1, 12, C.robeL);
          px(ctx, 22, 19, 1, 10, C.accH);
          px(ctx, 21, 20, 1, 8, C.acc);
          px(ctx, 8, 21, 9, 10, C.robe1);
          px(ctx, 32, 21, 9, 10, C.robe1);
          px(ctx, 8, 21, 1, 10, C.robe2);
          px(ctx, 40, 21, 1, 10, C.robe2);
          px(ctx, 9, 21, 1, 10, C.robeL);
          px(ctx, 39, 21, 1, 10, C.robeL);
          px(ctx, 8, 30, 9, 2, C.robeH);
          px(ctx, 32, 30, 9, 2, C.robeH);
          px(ctx, 9, 31, 7, 2, C.robe1);
          px(ctx, 33, 31, 7, 2, C.robe1);
          px(ctx, 16, 29, 16, 2, C.obi);
          px(ctx, 16, 29, 16, 1, C.obiH);
          px(ctx, 17, 31, 14, 5, C.leg);
          px(ctx, 16, 31, 1, 5, '#1e1e30');
          px(ctx, 32, 31, 1, 5, '#1e1e30');
          px(ctx, 19, 36, 4, 2, C.leg);
          px(ctx, 25, 36, 4, 2, C.leg);
          px(ctx, 19, 38, 4, 1, C.foot);
          px(ctx, 25, 38, 4, 1, C.foot);
          ctx.fillStyle = 'rgba(0,0,0,.15)';
          ctx.beginPath();
          ctx.ellipse(24, 41, 7, 2, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        function drawFrontWalkA(ctx) {
          drawFrontStand(ctx);
          ctx.clearRect(14, 36, 20, 6);
          px(ctx, 18, 36, 4, 4, C.leg);
          px(ctx, 26, 36, 4, 2, C.leg);
          px(ctx, 18, 40, 4, 1, C.foot);
          px(ctx, 26, 38, 4, 1, C.foot);
          ctx.fillStyle = 'rgba(0,0,0,.15)';
          ctx.beginPath();
          ctx.ellipse(24, 43, 7, 2, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        function drawFrontWalkB(ctx) {
          drawFrontStand(ctx);
          ctx.clearRect(14, 36, 20, 6);
          px(ctx, 19, 36, 4, 2, C.leg);
          px(ctx, 25, 36, 4, 4, C.leg);
          px(ctx, 19, 38, 4, 1, C.foot);
          px(ctx, 25, 40, 4, 1, C.foot);
          ctx.fillStyle = 'rgba(0,0,0,.15)';
          ctx.beginPath();
          ctx.ellipse(24, 43, 7, 2, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        function drawSideStand(ctx) {
          ctx.clearRect(0, 0, 48, 64);
          px(ctx, 17, 0, 12, 6, C.eboshi);
          px(ctx, 16, 1, 2, 5, C.eboshi);
          px(ctx, 28, 1, 2, 5, C.eboshi);
          px(ctx, 18, 0, 8, 1, C.eboshiH);
          px(ctx, 27, 0, 5, 3, C.eboshi);
          px(ctx, 30, 1, 4, 2, C.eboshi);
          px(ctx, 32, 2, 3, 2, C.eboshiH);
          px(ctx, 20, 5, 6, 1, '#8a7060');
          px(ctx, 18, 6, 12, 13, C.skin);
          px(ctx, 18, 6, 12, 1, C.skinS);
          px(ctx, 25, 9, 3, 1, '#2a1a10');
          px(ctx, 26, 11, 2, 1, '#1a1210');
          px(ctx, 26, 11, 1, 1, '#ffffff');
          px(ctx, 24, 14, 2, 1, '#e8a898');
          px(ctx, 28, 16, 2, 1, '#c08060');
          px(ctx, 17, 19, 14, 12, C.robe1);
          px(ctx, 16, 19, 1, 12, C.robe2);
          px(ctx, 29, 19, 1, 12, C.robeL);
          px(ctx, 29, 21, 10, 10, C.robe1);
          px(ctx, 38, 21, 1, 10, C.robe2);
          px(ctx, 29, 30, 10, 2, C.robeH);
          px(ctx, 30, 31, 8, 2, C.robe1);
          px(ctx, 17, 29, 13, 2, C.obi);
          px(ctx, 17, 29, 13, 1, C.obiH);
          px(ctx, 18, 31, 12, 5, C.leg);
          px(ctx, 19, 36, 4, 2, C.leg);
          px(ctx, 25, 36, 4, 2, C.leg);
          px(ctx, 19, 38, 4, 1, C.foot);
          px(ctx, 25, 38, 4, 1, C.foot);
          ctx.fillStyle = 'rgba(0,0,0,.15)';
          ctx.beginPath();
          ctx.ellipse(24, 41, 7, 2, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        function drawSideWalkA(ctx) {
          drawSideStand(ctx);
          ctx.clearRect(14, 36, 20, 6);
          px(ctx, 17, 36, 4, 4, C.leg);
          px(ctx, 26, 36, 4, 2, C.leg);
          px(ctx, 17, 40, 4, 1, C.foot);
          px(ctx, 26, 38, 4, 1, C.foot);
          ctx.fillStyle = 'rgba(0,0,0,.15)';
          ctx.beginPath();
          ctx.ellipse(24, 43, 7, 2, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        function drawSideWalkB(ctx) {
          drawSideStand(ctx);
          ctx.clearRect(14, 36, 20, 6);
          px(ctx, 19, 36, 4, 2, C.leg);
          px(ctx, 25, 36, 4, 4, C.leg);
          px(ctx, 19, 38, 4, 1, C.foot);
          px(ctx, 25, 40, 4, 1, C.foot);
          ctx.fillStyle = 'rgba(0,0,0,.15)';
          ctx.beginPath();
          ctx.ellipse(24, 43, 7, 2, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        function drawBackStand(ctx) {
          ctx.clearRect(0, 0, 48, 64);
          /* 折烏帽子（背面） */
          px(ctx, 17, 0, 14, 6, C.eboshi);
          px(ctx, 18, 0, 10, 1, C.eboshiH);
          px(ctx, 28, 0, 5, 3, C.eboshi);
          /* 髪（後頭部・薄め） */
          px(ctx, 18, 6, 12, 2, C.hair);
          /* うなじ（肌）正面と同じ高さ */
          px(ctx, 17, 8, 14, 11, C.skin);
          px(ctx, 17, 8, 14, 1, C.skinS);
          /* 直衣（背面） */
          px(ctx, 16, 19, 16, 12, C.robe1);
          px(ctx, 15, 19, 1, 12, C.robe2);
          px(ctx, 32, 19, 1, 12, C.robe2);
          px(ctx, 17, 19, 1, 12, C.robeL);
          px(ctx, 31, 19, 1, 12, C.robeL);
          px(ctx, 23, 19, 2, 12, '#381850');
          px(ctx, 8, 21, 9, 10, C.robe1);
          px(ctx, 32, 21, 9, 10, C.robe1);
          px(ctx, 8, 21, 1, 10, C.robe2);
          px(ctx, 40, 21, 1, 10, C.robe2);
          px(ctx, 8, 30, 9, 2, C.robeH);
          px(ctx, 32, 30, 9, 2, C.robeH);
          px(ctx, 9, 31, 7, 2, C.robe1);
          px(ctx, 33, 31, 7, 2, C.robe1);
          px(ctx, 16, 29, 16, 2, C.obi);
          px(ctx, 16, 29, 16, 1, C.obiH);
          px(ctx, 20, 29, 3, 3, C.obiH);
          px(ctx, 25, 29, 3, 3, C.obiH);
          px(ctx, 17, 31, 14, 5, C.leg);
          px(ctx, 16, 31, 1, 5, '#1e1e30');
          px(ctx, 32, 31, 1, 5, '#1e1e30');
          px(ctx, 19, 36, 4, 2, C.leg);
          px(ctx, 25, 36, 4, 2, C.leg);
          px(ctx, 19, 38, 4, 1, C.foot);
          px(ctx, 25, 38, 4, 1, C.foot);
          ctx.fillStyle = 'rgba(0,0,0,.15)';
          ctx.beginPath();
          ctx.ellipse(24, 41, 7, 2, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        function drawBackWalkA(ctx) {
          drawBackStand(ctx);
          ctx.clearRect(14, 36, 20, 6);
          px(ctx, 18, 36, 4, 4, C.leg);
          px(ctx, 26, 36, 4, 2, C.leg);
          px(ctx, 18, 40, 4, 1, C.foot);
          px(ctx, 26, 38, 4, 1, C.foot);
          ctx.fillStyle = 'rgba(0,0,0,.15)';
          ctx.beginPath();
          ctx.ellipse(24, 43, 7, 2, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        function drawBackWalkB(ctx) {
          drawBackStand(ctx);
          ctx.clearRect(14, 36, 20, 6);
          px(ctx, 19, 36, 4, 2, C.leg);
          px(ctx, 25, 36, 4, 4, C.leg);
          px(ctx, 19, 38, 4, 1, C.foot);
          px(ctx, 25, 40, 4, 1, C.foot);
          ctx.fillStyle = 'rgba(0,0,0,.15)';
          ctx.beginPath();
          ctx.ellipse(24, 43, 7, 2, 0, 0, Math.PI * 2);
          ctx.fill();
        }

        /* --- キャンバス反転ヘルパー --- */
        function mirrorCanvas(src) {
          var c = document.createElement('canvas');
          c.width = src.width;
          c.height = src.height;
          var x = c.getContext('2d');
          x.translate(c.width, 0);
          x.scale(-1, 1);
          x.drawImage(src, 0, 0);
          return c;
        }

        /* --- キャンバス→テクスチャ --- */
        function mkTex(fn) {
          var c = document.createElement('canvas');
          c.width = 48;
          c.height = 64;
          fn(c.getContext('2d'));
          var t = new THREE.CanvasTexture(c);
          t.magFilter = THREE.NearestFilter;
          t.minFilter = THREE.NearestFilter;
          return t;
        }
        var tFStand = mkTex(drawFrontStand),
          tFWalkA = mkTex(drawFrontWalkA),
          tFWalkB = mkTex(drawFrontWalkB);
        var tSStand = mkTex(drawSideStand),
          tSWalkA = mkTex(drawSideWalkA),
          tSWalkB = mkTex(drawSideWalkB);
        var tLStand = new THREE.CanvasTexture(mirrorCanvas(tSStand.image));
        var tLWalkA = new THREE.CanvasTexture(mirrorCanvas(tSWalkA.image));
        var tLWalkB = new THREE.CanvasTexture(mirrorCanvas(tSWalkB.image));
        var tBStand = mkTex(drawBackStand);
        [tLStand, tLWalkA, tLWalkB, tBStand].forEach(function (t) {
          t.magFilter = THREE.NearestFilter;
          t.minFilter = THREE.NearestFilter;
        });
        var facingSide = true;

        /* ================================================================
   THREE.JS シーン
   ================================================================ */
        var container = document.getElementById('game-container');
        var scene = new THREE.Scene();
        var camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 0.1, 200);
        var CAM_OFF = new THREE.Vector3(0, 4.0, 4.5);

        var renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.setSize(innerWidth, innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        addEventListener('resize', function () {
          camera.aspect = innerWidth / innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(innerWidth, innerHeight);
        });

        /* --- 空 --- */
        (function () {
          var c = document.createElement('canvas');
          c.width = 2;
          c.height = 256;
          var x = c.getContext('2d'),
            g = x.createLinearGradient(0, 0, 0, 256);
          g.addColorStop(0, '#050a16');
          g.addColorStop(0.35, '#101e34');
          g.addColorStop(0.65, '#2a3a5a');
          g.addColorStop(0.88, '#6a4020');
          g.addColorStop(1, '#aa7040');

        /* ================================================================
   木（杉）— 参道の両脇に並ぶ
   ================================================================ */
        function makeTree(x, z, h) {
          var g = new THREE.Group();
          var trunk = new THREE.Mesh(
            new THREE.CylinderGeometry(0.12, 0.18, h * 0.4, 6),
            new THREE.MeshStandardMaterial({ color: 0x4a3020, roughness: 0.9 })
          );
          trunk.position.y = h * 0.2;
          trunk.castShadow = true;
          g.add(trunk);
          for (var i = 0; i < 3; i++) {
            var r = h * 0.22 - i * 0.08;
            var cone = new THREE.Mesh(
              new THREE.ConeGeometry(r, h * 0.3, 6),
              new THREE.MeshStandardMaterial({ color: 0x1a4a20 - i * 0x0a1008, roughness: 0.85 })
            );
            cone.position.y = h * 0.4 + i * h * 0.22;
            cone.castShadow = true;
            g.add(cone);
          }
          g.position.set(x, 0, z);
          scene.add(g);
          return g;
        }
        var treeXs = [-3.8, -4.5, -5.2, -6.0, 3.8, 4.5, 5.2, 6.0];
        var treeZs = [11, 9, 7, 5, 3, 1, -1, -3, -5, -7, -9];
        treeXs.forEach(function (tx) {
          treeZs.forEach(function (tz) {
            if (Math.random() > 0.3)
              makeTree(tx + (Math.random() - 0.5) * 0.8, tz + (Math.random() - 0.5) * 1.5, 3 + Math.random() * 2.0);
          });
        });

          var g = new THREE.Mesh(
            new THREE.DodecahedronGeometry(0.3, 0),
            new THREE.MeshStandardMaterial({ color: c || 0x6a6a62, roughness: 0.92 })
          );
          g.scale.set(sx, sy, sz);
          g.position.set(x, 0.15, z);
          g.rotation.set(Math.random(), Math.random(), 0);
          g.castShadow = true;
          scene.add(g);
        }
        [
          [-2.2, 9.5, 1.2, 0.6, 1.0],
          [2.3, 7.2, 0.8, 0.5, 0.9],
          [-2.0, 3.8, 1.0, 0.7, 1.1],
          [2.1, 1.5, 0.9, 0.5, 0.8],
          [-2.3, -1.2, 1.1, 0.6, 0.9],
          [2.0, -2.8, 0.7, 0.4, 0.8]
        ].forEach(function (r) {
          makeRock(r[0], r[1], r[2], r[3], r[4]);
        });

        /* ================================================================
   草むら
   ================================================================ */
        function makeGrass(x, z) {
          var g = new THREE.Group();
          for (var i = 0; i < 5; i++) {
            var blade = new THREE.Mesh(
              new THREE.PlaneGeometry(0.06, 0.2 + Math.random() * 0.2),
              new THREE.MeshStandardMaterial({ color: 0x3a8030, side: THREE.DoubleSide })
            );
            blade.position.set((Math.random() - 0.5) * 0.3, 0.1, (Math.random() - 0.5) * 0.2);
            blade.rotation.z = (Math.random() - 0.5) * 0.4;
            g.add(blade);
          }
          g.position.set(x, 0, z);
          scene.add(g);
        }
        for (var gi = 0; gi < 25; gi++) {
          makeGrass((Math.random() - 0.5) * 8, PZS - Math.random() * 22);
        }

        /* ================================================================
   低木・灌木（参道沿いの賑やかさ）
   ================================================================ */
        function makeBush(x, z, s) {
          var g = new THREE.Group();
          for (var i = 0; i < 3; i++) {
            var b = new THREE.Mesh(
              new THREE.SphereGeometry(0.2 + i * 0.08, 6, 5),
              new THREE.MeshStandardMaterial({ color: 0x2a6828 - i * 0x081008, roughness: 0.85 })
            );
            b.position.set((Math.random() - 0.5) * 0.3, 0.18 + i * 0.08, (Math.random() - 0.5) * 0.2);
            b.scale.y = 0.7;
            b.castShadow = true;
            g.add(b);
          }
          g.position.set(x, 0, z);
          g.scale.setScalar(s || 1);
          scene.add(g);
        }
        makeBush(-4.0, 9.5, 1.0);
        makeBush(4.2, 8.0, 0.8);
        makeBush(-4.5, 5.5, 1.2);
        makeBush(4.8, 3.5, 0.9);
        makeBush(-4.2, 1.0, 1.1);
        makeBush(5.0, -1.5, 0.7);
        makeBush(-3.8, -3.0, 1.0);
        makeBush(4.5, -4.5, 0.8);
        makeBush(-5.5, 2.0, 0.9);

        /* ================================================================
   小さな池（参道脇）
   ================================================================ */
        (function () {
          var pond = new THREE.Mesh(
            new THREE.CircleGeometry(1.2, 16),
            new THREE.MeshStandardMaterial({
              color: 0x1a3a5a,
              roughness: 0.2,
              metalness: 0.3,
              transparent: true,
              opacity: 0.85
            })
          );
          pond.rotation.x = -Math.PI / 2;
          pond.position.set(-4.0, 0.02, 6.0);
          scene.add(pond);
          var ring = new THREE.Mesh(
            new THREE.RingGeometry(1.1, 1.3, 16),
            new THREE.MeshStandardMaterial({ color: 0x606058, roughness: 0.9, side: THREE.DoubleSide })
          );
          ring.rotation.x = -Math.PI / 2;
          ring.position.set(-4.0, 0.03, 6.0);
          scene.add(ring);
          /* 蓮の葉 */
          for (var li = 0; li < 3; li++) {
            var leaf = new THREE.Mesh(
              new THREE.CircleGeometry(0.18 + Math.random() * 0.12, 8),
              new THREE.MeshStandardMaterial({ color: 0x308030, side: THREE.DoubleSide })
            );
            leaf.rotation.x = -Math.PI / 2;
            leaf.position.set(-4.0 + (Math.random() - 0.5) * 1.2, 0.04, 6.0 + (Math.random() - 0.5) * 1.2);
            scene.add(leaf);
          }
          /* 蛍の光を池に */
          var pl = new THREE.PointLight(0x88ccff, 0.2, 3, 2);
          pl.position.set(-4.0, 0.5, 6.0);
          scene.add(pl);
        })();

        /* ================================================================
   石畳み（参道脇の小道）
   ================================================================ */
        for (var si = 0; si < 12; si++) {
          var sx = -5.5 + Math.random() * 11;
          var sz = PZS - 4 - Math.random() * 18;
          if (Math.abs(sx) < 2.5) continue;
          var stone = new THREE.Mesh(
            new THREE.CylinderGeometry(0.18 + Math.random() * 0.1, 0.2 + Math.random() * 0.1, 0.06, 6),
            new THREE.MeshStandardMaterial({ color: 0x888880, roughness: 0.9 })
          );
          stone.position.set(sx, 0.03, sz);
          stone.rotation.y = Math.random() * Math.PI;
          stone.receiveShadow = true;
          scene.add(stone);
        }

        /* ================================================================
   鳥居前の注連縄
   ================================================================ */
        (function () {
          var ropeMat = new THREE.MeshStandardMaterial({ color: 0xe8dcc0, roughness: 0.8 });
          var rope = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.035, 3.8, 6), ropeMat);
          rope.rotation.z = Math.PI / 2;
          rope.position.set(0, 2.6, 2.6);
          scene.add(rope);
          for (var si = -1; si <= 1; si += 2) {
            var shide = new THREE.Mesh(
              new THREE.BoxGeometry(0.12, 0.3, 0.04),
              new THREE.MeshStandardMaterial({ color: 0xf0e8d0, side: THREE.DoubleSide })
            );
            shide.position.set(si * 0.6, 2.45, 2.6);
            scene.add(shide);
          }
        })();

        /* ================================================================
   石碑（社の手前）
   ================================================================ */
        (function () {
          var g = new THREE.Group();
          var stone = new THREE.Mesh(
            new THREE.BoxGeometry(0.6, 1.0, 0.2),
            new THREE.MeshStandardMaterial({ color: 0x808078, roughness: 0.9 })
          );
          stone.position.y = 0.5;
          stone.castShadow = true;
          g.add(stone);
          var base = new THREE.Mesh(
            new THREE.BoxGeometry(0.7, 0.2, 0.3),
            new THREE.MeshStandardMaterial({ color: 0x707068, roughness: 0.9 })
          );
          base.position.y = 0.1;
          g.add(base);
          g.position.set(-1.8, 0, -2.2);
          scene.add(g);
        })();

        /* ================================================================
   献げ物台（社の前）
   ================================================================ */
        (function () {
          var g = new THREE.Group();
          var tbl = new THREE.Mesh(
            new THREE.BoxGeometry(1.2, 0.08, 0.5),
            new THREE.MeshStandardMaterial({ color: 0x8b7050, roughness: 0.8 })
          );
          tbl.position.y = 0.7;
          g.add(tbl);
          for (var i = -1; i <= 1; i += 2) {
            var leg = new THREE.Mesh(
              new THREE.CylinderGeometry(0.04, 0.04, 0.7, 6),
              new THREE.MeshStandardMaterial({ color: 0x6a5040 })
            );
            leg.position.set(i * 0.5, 0.35, 0);
            g.add(leg);
          }
          var sake = new THREE.Mesh(
            new THREE.CylinderGeometry(0.06, 0.08, 0.22, 6),
            new THREE.MeshStandardMaterial({ color: 0xf0e8d0 })
          );
          sake.position.set(-0.3, 0.81, 0);
          g.add(sake);
          var rice = new THREE.Mesh(
            new THREE.CylinderGeometry(0.1, 0.1, 0.12, 6),
            new THREE.MeshStandardMaterial({ color: 0xf8f0e0 })
          );
          rice.position.set(0.3, 0.76, 0);
          g.add(rice);
          g.position.set(0, 0, -2.4);
          scene.add(g);
        })();

        /* ================================================================
   粒子（灰・蛍の光の残像）
   ================================================================ */
        var EMBER_N = 30;
        var emberGeo = new THREE.BufferGeometry();
        var emberPos = new Float32Array(EMBER_N * 3);
        var emberData = [];
        for (var ei = 0; ei < EMBER_N; ei++) {
          emberPos[ei * 3] = (Math.random() - 0.5) * 10;
          emberPos[ei * 3 + 1] = 1.0 + Math.random() * 3.0;
          emberPos[ei * 3 + 2] = PZS - Math.random() * 20;
          emberData.push({ vy: 0.1 + Math.random() * 0.3, life: Math.random() * 5, max: 4 + Math.random() * 3 });
        }
        emberGeo.setAttribute('position', new THREE.BufferAttribute(emberPos, 3));
        var emberMat = new THREE.PointsMaterial({
          color: 0xffaa44,
          size: 0.06,
          transparent: true,
          opacity: 0.7,
          blending: THREE.AdditiveBlending,
          depthWrite: false
        });
        var embers = new THREE.Points(emberGeo, emberMat);
        scene.add(embers);

        /* ================================================================
   鳥居の影（地面に投影）
   ================================================================ */
        (function () {
          var shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.15 });
          var shadow = new THREE.Mesh(new THREE.PlaneGeometry(4.0, 0.6), shadowMat);
          shadow.rotation.x = -Math.PI / 2;
          shadow.position.set(0, 0.02, 2.3);
          scene.add(shadow);
        })();

        /* ================================================================
   蛍の光をもっと柔らかく
   ================================================================ */
        var flyGlow = new THREE.PointLight(0xd0ff98, 0.15, 8, 2);
        flyGlow.position.set(0, 1.5, 5);
        scene.add(flyGlow);

        /* ================================================================
   蛍パーティクル
   ================================================================ */
        var FLY_N = 80;
        var flyGeo = new THREE.BufferGeometry();
        var flyPos = new Float32Array(FLY_N * 3);
        var flyData = [];
        for (var i = 0; i < FLY_N; i++) {
          flyPos[i * 3] = (Math.random() - 0.5) * 12;
          flyPos[i * 3 + 1] = 0.2 + Math.random() * 2.8;
          flyPos[i * 3 + 2] = PZS - Math.random() * 24;
          flyData.push({ ph: Math.random() * Math.PI * 2, sp: 0.3 + Math.random() * 0.7 });
        }
        flyGeo.setAttribute('position', new THREE.BufferAttribute(flyPos, 3));
        var flyMat = new THREE.PointsMaterial({
          color: 0xd0ff98,
          size: 0.1,
          transparent: true,
          opacity: 0.9,
          blending: THREE.AdditiveBlending,
          depthWrite: false
        });
        scene.add(new THREE.Points(flyGeo, flyMat));

        /* ================================================================
   花火
   ================================================================ */
        var fws = [];
        function spawnFW() {
          var n = 100;
          var geo = new THREE.BufferGeometry();
          var pos = new Float32Array(n * 3);
          var vel = [];
          var cx = (Math.random() - 0.5) * 20,
            cy = 10 + Math.random() * 4,
            cz = -18 - Math.random() * 10;
          var col = new THREE.Color().setHSL(Math.random(), 0.8, 0.65);
          for (var i = 0; i < n; i++) {
            pos[i * 3] = cx;
            pos[i * 3 + 1] = cy;
            pos[i * 3 + 2] = cz;
            var th = Math.random() * Math.PI * 2,
              ph = Math.acos(2 * Math.random() - 1),
              sp = 1.2 + Math.random() * 1.4;
            vel.push(
              new THREE.Vector3(Math.sin(ph) * Math.cos(th) * sp, Math.sin(ph) * Math.sin(th) * sp, Math.cos(ph) * sp)
            );
          }
          geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
          var mat = new THREE.PointsMaterial({
            color: col,
            size: 0.16,
            transparent: true,
            opacity: 1,
            blending: THREE.AdditiveBlending,
            depthWrite: false
          });
          var pts = new THREE.Points(geo, mat);
          scene.add(pts);
          fws.push({ pts: pts, vel: vel, life: 0, max: 2.4 });
        }
        var fwTimer = 2.0;

        /* ================================================================
   プレイヤー
   ================================================================ */
        var smat = new THREE.SpriteMaterial({ map: tFStand, transparent: true });
        var player = new THREE.Sprite(smat);
        player.scale.set(1.5, 1.6, 1);
        player.position.set(0, 0.75, PZS - 1.5);
        scene.add(player);
        var lastDirX = 0,
          lastDirZ = 1;

        /* ================================================================
   操作
   ================================================================ */
        var mv = { up: false, down: false, left: false, right: false };
        function bind(id, k) {
          var el = document.getElementById(id);
          var on = function (e) {
            e.preventDefault();
            mv[k] = true;
            el.classList.add('active');
          };
          var off = function (e) {
            if (e) e.preventDefault();
            mv[k] = false;
            el.classList.remove('active');
          };
          el.addEventListener('touchstart', on, { passive: false });
          el.addEventListener('touchend', off, { passive: false });
          el.addEventListener('touchcancel', off, { passive: false });
          el.addEventListener('mousedown', on);
          el.addEventListener('mouseup', off);
          el.addEventListener('mouseleave', off);
        }
        bind('btn-up', 'up');
        bind('btn-down', 'down');
        bind('btn-left', 'left');
        bind('btn-right', 'right');
        var kbBtnMap = {
          ArrowUp: 'btn-up',
          w: 'btn-up',
          ArrowDown: 'btn-down',
          s: 'btn-down',
          ArrowLeft: 'btn-left',
          a: 'btn-left',
          ArrowRight: 'btn-right',
          d: 'btn-right'
        };
        addEventListener('keydown', function (e) {
          if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'w', 'a', 's', 'd'].indexOf(e.key) !== -1)
            e.preventDefault();
          if (e.key === 'ArrowUp' || e.key === 'w') mv.up = true;
          if (e.key === 'ArrowDown' || e.key === 's') mv.down = true;
          if (e.key === 'ArrowLeft' || e.key === 'a') mv.left = true;
          if (e.key === 'ArrowRight' || e.key === 'd') mv.right = true;
          var b = kbBtnMap[e.key];
          if (b) document.getElementById(b).classList.add('active');
        });
        addEventListener('keyup', function (e) {
          if (e.key === 'ArrowUp' || e.key === 'w') mv.up = false;
          if (e.key === 'ArrowDown' || e.key === 's') mv.down = false;
          if (e.key === 'ArrowLeft' || e.key === 'a') mv.left = false;
          if (e.key === 'ArrowRight' || e.key === 'd') mv.right = false;
          var b = kbBtnMap[e.key];
          if (b) document.getElementById(b).classList.remove('active');
        });

        /* ================================================================
   ゲーム状態
   ================================================================ */
        var ended = false,
          walkT = 0,
          bob = 0,
          frame = 0,
          wft = 0;
        var SPD = 3.0,
          PW = 1.5,
          TRIG_Z = 1.5;

        function triggerEnd() {
          if (ended) return;
          ended = true;
          document.getElementById('dpad').style.display = 'none';
          document.getElementById('ending').classList.add('show');
        }

        /* ================================================================
   メインループ
   ================================================================ */
        var clock = new THREE.Clock();
        setTimeout(function () {
          document.getElementById('intro').classList.add('hide');
        }, 4000);

        function animate() {
          requestAnimationFrame(animate);
          var dt = Math.min(clock.getDelta(), 0.05);
          var t = clock.elapsedTime;

          /* 蛍 */
          var fa = flyGeo.attributes.position;
          for (var i = 0; i < FLY_N; i++) {
            var d = flyData[i];
            fa.array[i * 3 + 1] += Math.sin(t * d.sp + d.ph) * 0.003;
            fa.array[i * 3] += Math.cos(t * 0.4 * d.sp + d.ph) * 0.004;
          }
          fa.needsUpdate = true;
          flyMat.opacity = 0.5 + Math.sin(t * 1.8) * 0.35;

          /* 幟 */
          banners.forEach(function (b) {
            b.rotation.z = Math.sin(t * 1.5 + b.userData.sway) * 0.08;
            b.rotation.x = Math.sin(t * 0.8 + b.userData.sway) * 0.03;
          });

          /* 粒子（灰） */
          var ea = emberGeo.attributes.position;
          for (var ei = 0; ei < EMBER_N; ei++) {
            var ed = emberData[ei];
            ed.life += dt;
            ea.array[ei * 3 + 1] += ed.vy * dt;
            ea.array[ei * 3] += Math.sin(t * 0.5 + ei) * 0.003;
            if (ed.life > ed.max) {
              ed.life = 0;
              ea.array[ei * 3] = (Math.random() - 0.5) * 10;
              ea.array[ei * 3 + 1] = 0.5 + Math.random() * 1.0;
              ea.array[ei * 3 + 2] = player.position.z - 2 + Math.random() * 8;
            }
          }
          ea.needsUpdate = true;
          emberMat.opacity = Math.max(0, 0.5 - Math.sin(t * 0.3) * 0.2);

          /* 花火 */
          fwTimer -= dt;
          if (fwTimer <= 0) {
            spawnFW();
            fwTimer = 3 + Math.random() * 4;
          }
          for (var fi = fws.length - 1; fi >= 0; fi--) {
            var fw = fws[fi];
            fw.life += dt;
            var arr = fw.pts.geometry.attributes.position.array;
            for (var j = 0; j < fw.vel.length; j++) {
              arr[j * 3] += fw.vel[j].x * dt;
              arr[j * 3 + 1] += fw.vel[j].y * dt - dt * 0.55;
              arr[j * 3 + 2] += fw.vel[j].z * dt;
            }
            fw.pts.geometry.attributes.position.needsUpdate = true;
            fw.pts.material.opacity = Math.max(0, 1 - fw.life / fw.max);
            if (fw.life >= fw.max) {
              scene.remove(fw.pts);
              fws.splice(fi, 1);
            }
          }

          /* プレイヤー移動 */
          if (!ended) {
            var dx = 0,
              dz = 0;
            if (mv.up) dz -= 1;
            if (mv.down) dz += 1;
            if (mv.left) dx -= 1;
            if (mv.right) dx += 1;
            var moving = dx !== 0 || dz !== 0;
            if (moving) {
              var len = Math.hypot(dx, dz);
              dx /= len;
              dz /= len;
              player.position.x += dx * SPD * dt;
              player.position.z += dz * SPD * dt;
              player.position.x = Math.max(-PW, Math.min(PW, player.position.x));
              player.position.z = Math.max(-5, Math.min(PZS - 0.5, player.position.z));

              /* 向き */
              lastDirX = dx;
              lastDirZ = dz;
              player.scale.x = 1.5;

              /* 歩行アニメ */
              wft += dt;
              if (wft > 0.16) {
                wft = 0;
                frame = (frame + 1) % 4;
              }
              var curTex;
              var absDx = Math.abs(dx),
                absDz = Math.abs(dz);
              if (absDx > absDz) {
                if (dx < 0) {
                  if (frame <= 1) curTex = tLStand;
                  else if (frame === 2) curTex = tLWalkA;
                  else curTex = tLWalkB;
                } else {
                  if (frame <= 1) curTex = tSStand;
                  else if (frame === 2) curTex = tSWalkA;
                  else curTex = tSWalkB;
                }
              } else if (absDz > absDx) {
                if (dz < 0) {
                  if (frame <= 1) curTex = tBStand;
                  else curTex = tBStand;
                } else {
                  if (frame <= 1) curTex = tFStand;
                  else if (frame === 2) curTex = tFWalkA;
                  else curTex = tFWalkB;
                }
              } else {
                if (frame <= 1) curTex = tFStand;
                else if (frame === 2) curTex = tFWalkA;
                else curTex = tFWalkB;
              }
              smat.map = curTex;
              bob += dt * 10;
              player.position.y = 0.75 + Math.abs(Math.sin(bob)) * 0.06;
            } else {
              var absLx = Math.abs(lastDirX),
                absLz = Math.abs(lastDirZ);
              if (absLx > absLz) {
                smat.map = lastDirX < 0 ? tLStand : tSStand;
              } else if (absLz > absLx) {
                smat.map = lastDirZ < 0 ? tBStand : tFStand;
              } else {
                smat.map = tFStand;
              }
              player.position.y = 0.75;
              wft = 0;
              frame = 0;
            }

            if (player.position.z <= TRIG_Z && Math.abs(player.position.x) < 1.7) triggerEnd();
          }

          /* カメラ */
          var ct = new THREE.Vector3(player.position.x * 0.6 + CAM_OFF.x, CAM_OFF.y, player.position.z + CAM_OFF.z);
          camera.position.lerp(ct, 1 - Math.pow(0.001, dt));
          camera.lookAt(player.position.x * 0.6, 1.0, player.position.z - 2);

          renderer.render(scene, camera);
        }

        camera.position.set(CAM_OFF.x, CAM_OFF.y, player.position.z + CAM_OFF.z);
        camera.lookAt(0, 1.0, player.position.z - 2);
        document.getElementById('loading').style.display = 'none';
        animate();
      })();
    </script>
  </body>
</html>
