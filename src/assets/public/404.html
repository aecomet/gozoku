      href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&family=Noto+Serif+JP:wght@200;300;400;600&family=Noto+Sans+JP:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #080c10;
        --ink2: #0e1419;
        --ink3: #141e26;
        --ocean: #1a5f7a;
        --wave: #6db8cc;
        --copper: #a0612a;
        --rust: #c47a3a;
        --parchment: #d4c4a0;
        --ash: #8a9aa5;
        --white: #e8eff2;
        --border: rgba(160, 97, 42, 0.25);
        --border-b: rgba(160, 97, 42, 0.55);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        position: relative;
        min-height: 100vh;
        font-family: 'Noto Serif JP', serif;
        font-weight: 300;
        background:
          radial-gradient(1200px 700px at 15% -20%, rgba(109, 184, 204, 0.12), transparent 65%),
          radial-gradient(900px 600px at 90% 120%, rgba(160, 97, 42, 0.18), transparent 70%), var(--ink);
        color: var(--parchment);
        display: grid;
        place-items: center;
        padding: 24px;
        overflow: hidden;
      }

      body::after {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
        opacity: 0.035;
        mix-blend-mode: overlay;
      }

      .not-found {
        position: relative;
        z-index: 1;
        width: min(640px, 100%);
        padding: 40px 32px;
        background: linear-gradient(145deg, rgba(20, 30, 38, 0.92), rgba(8, 12, 16, 0.95));
        border: 1px solid var(--border);
        border-radius: 16px;
        backdrop-filter: blur(6px);
        box-shadow:
          inset 0 0 0 1px rgba(109, 184, 204, 0.08),
          0 18px 46px rgba(0, 0, 0, 0.35);
        text-align: center;
      }

      .code {
        display: inline-block;
        margin-bottom: 12px;
        font-size: clamp(48px, 10vw, 80px);
        font-weight: 700;
        line-height: 1;
        letter-spacing: 0.04em;
        color: var(--rust);
        text-shadow: 0 4px 18px rgba(196, 122, 58, 0.35);
      }

      h1 {
        margin-bottom: 10px;
        font-size: clamp(24px, 4vw, 32px);
        font-weight: 500;
        color: var(--parchment);
      }

      p {
        color: var(--ash);
        font-size: 16px;
        line-height: 1.7;
      }

      .actions {
        margin-top: 28px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 44px;
        padding: 0 20px;
        border-radius: 999px;
        border: 1px solid var(--border-b);
        background: linear-gradient(180deg, rgba(160, 97, 42, 0.95), rgba(122, 73, 30, 0.95));
        color: var(--white);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease,
          filter 0.2s ease;
      }

      .button:hover {
        transform: translateY(-1px);
        filter: brightness(1.06);
        box-shadow: 0 8px 24px rgba(160, 97, 42, 0.35);
      }
    </style>
  </head>

  <body>
    <main class="not-found" aria-labelledby="not-found-title">
      <span class="code" aria-hidden="true">404</span>
      <h1 id="not-found-title">ページが見つかりません</h1>
      <p>URLが変更されたか、削除された可能性があります。<br />トップページから再度アクセスしてください。</p>
      <div class="actions">
        <a class="button" href="https://aecomet.github.io/gozoku/">トップページへ戻る</a>
      </div>
    </main>
  </body>
</html>
